<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🍽️</span>
                <span class="logo-name">QR<b>Menu</b></span>
            </div>
            <div class="header-right">
                <div class="live-badge"><span class="dot"></span> Live Menu</div>
                <a href="admin.html" class="btn-admin">⚙️ Admin Panel</a>
            </div>
        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <p class="hero-tag">✨ Digital Menu</p>
        <h1>Discover Our <span class="accent">Delicious</span> Dishes</h1>
        <p class="hero-sub">Browse our full menu and find your next favourite meal.</p>
    </section>

    <!-- CATEGORIES -->
    <section class="cat-section">
        <p class="section-label">Filter by category</p>
        <div class="pills" id="pills">
            <div class="pill skeleton-pill"></div>
            <div class="pill skeleton-pill"></div>
            <div class="pill skeleton-pill"></div>
        </div>
    </section>

    <!-- FOOD GRID -->
    <main class="main">
        <div class="grid-header">
            <h2 id="sectionTitle">All Items</h2>
            <span class="count-badge" id="countBadge">Loading…</span>
        </div>
        <div class="grid" id="grid">
            <div class="card skeleton-card">
                <div class="card-img sk"></div>
                <div class="card-body">
                    <div class="sk-line w50"></div>
                    <div class="sk-line w80"></div>
                    <div class="sk-line w40"></div>
                </div>
            </div>
            <div class="card skeleton-card">
                <div class="card-img sk"></div>
                <div class="card-body">
                    <div class="sk-line w50"></div>
                    <div class="sk-line w80"></div>
                    <div class="sk-line w40"></div>
                </div>
            </div>
            <div class="card skeleton-card">
                <div class="card-img sk"></div>
                <div class="card-body">
                    <div class="sk-line w50"></div>
                    <div class="sk-line w80"></div>
                    <div class="sk-line w40"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer><span>© 2025 QRMenu · Built with FastAPI 🚀</span></footer>

    <script src="app.js"></script>
</body>

</html>
